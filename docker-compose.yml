version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: jembatannurani
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - jembatannurani_data:/var/lib/rabbitmq

volumes:
  jembatannurani_data:
